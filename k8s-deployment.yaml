apiVersion: v1
kind: Namespace
metadata:
  name: xpu-monitor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: xpu-monitor-config
  namespace: xpu-monitor
data:
  # 服务器配置文件示例
  servers.json: |
    {
      "servers": [
        {
          "name": "示例GPU服务器",
          "host": "192.168.1.100",
          "port": 22,
          "type": "gpu",
          "local": false,
          "auth": {
            "type": "password",
            "username": "monitor",
            "password": "your_password_here"
          },
          "enable_storage_monitoring": true,
          "enable_docker_monitoring": true
        }
      ],
      "llm_config": {
        "enabled": false,
        "api_url": "",
        "api_key": "",
        "model": "gpt-3.5-turbo"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xpu-monitor
  namespace: xpu-monitor
  labels:
    app: xpu-monitor
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xpu-monitor
  template:
    metadata:
      labels:
        app: xpu-monitor
        version: v1
    spec:
      containers:
      - name: xpu-monitor
        image: xpu-monitor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        - name: FLASK_ENV
          value: "production"
        - name: FLASK_DEBUG
          value: "0"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/servers
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/servers
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        hostPath:
          path: /mnt/private/app/xpu-monitor
          type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: xpu-monitor
  namespace: xpu-monitor
  labels:
    app: xpu-monitor
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: xpu-monitor
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xpu-monitor-ingress
  namespace: xpu-monitor
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - xpu.dev.huawei.com
    secretName: xpu-monitor-tls
  rules:
  - host: xpu.dev.huawei.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: xpu-monitor
            port:
              number: 80
