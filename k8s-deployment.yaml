apiVersion: v1
kind: Namespace
metadata:
  name: xpu-monitor
---
apiVersion: apps/v1
kind: 部署
metadata:
  name: xpu-monitor
  namespace: xpu-monitor
  labels:
    app: xpu-monitor
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xpu-monitor
  template:
    metadata:
      labels:
        app: xpu-monitor
        version: v1
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - name: xpu-monitor
        image: registry.dev.huawei.com/flash_stor/xpu-monitor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        - name: FLASK_ENV
          value: "production"
        - name: FLASK_DEBUG
          value: "0"
        - name: TZ
          value: "Asia/Shanghai"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: tz-config
          mountPath: /etc/localtime
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/servers
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/servers
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        hostPath:
          path: /mnt/private/app/xpu-monitor
          type: DirectoryOrCreate
      - name: tz-config
        hostPath:
          path: /usr/share/zoneinfo/Asia/Shanghai
          type: File
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: xpu-monitor
  namespace: xpu-monitor
  labels:
    app: xpu-monitor
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: xpu-monitor
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xpu-monitor-ingress
  namespace: xpu-monitor
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-cache: "off"
spec:
  ingressClassName: nginx 
  rules:
  - host: xpu.dev.huawei.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: xpu-monitor
            port:
              number: 80
