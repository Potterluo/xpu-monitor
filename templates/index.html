<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPU 监控平台</title>
    <link rel="icon" href="/static/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/event-source-polyfill@1.0.26/src/eventsource.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { screens: { '3xl': '1920px' }, colors: { 'gray-750': '#2d3748' } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .loader { border: 3px solid rgba(59,130,246,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .server-column { min-width: 0; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: default; }
        .server-column:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.15), 0 4px 10px -5px rgba(0,0,0,0.1); }
        .dark .server-column:hover { box-shadow: 0 8px 25px -5px rgba(0,0,0,0.4), 0 4px 10px -5px rgba(0,0,0,0.3); }
        .server-column .dev-row { display: flex; align-items: center; gap: 2px; padding: 1px 0; }
        .server-column .sto-row { display: flex; align-items: center; gap: 2px; padding: 1px 0; }
        .server-column .ep-row { display: flex; align-items: center; gap: 2px; padding: 1px 0; }
        .server-column .bar-bg { background: rgba(128,128,128,0.15); border-radius: 2px; height: 4px; flex: 1; min-width: 15px; }
        .server-column .bar-fill { height: 4px; border-radius: 2px; transition: width 0.5s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col">

    <header class="bg-white/80 dark:bg-gray-800/90 backdrop-blur sticky top-0 z-50 border-b border-gray-200 dark:border-gray-700">
        <div class="w-full px-4 py-1.5 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-blue-600 rounded flex items-center justify-center">
                    <i class="fas fa-microchip text-white text-xs"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-gray-900 dark:text-white leading-tight">XPU 监控平台</h1>
                    <p class="text-[10px] text-gray-500 dark:text-gray-400 leading-tight">实时性能监控</p>
                </div>
            </div>
            <div class="flex items-center space-x-1.5">
                <button id="refreshBtn" class="px-2.5 py-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs hover:bg-blue-50 dark:hover:bg-gray-600 transition-all"><i class="fas fa-sync-alt text-gray-600 dark:text-gray-300 mr-1"></i><span class="text-gray-600 dark:text-gray-300">刷新</span></button>
                <button id="configBtn" class="px-2.5 py-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs hover:bg-gray-50 dark:hover:bg-gray-600 transition-all"><i class="fas fa-cog text-gray-600 dark:text-gray-300 mr-1"></i><span class="text-gray-600 dark:text-gray-300">配置</span></button>
                <button id="mockDataBtn" class="px-2.5 py-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs hover:bg-purple-50 dark:hover:bg-gray-600 transition-all" style="display:none;"><i class="fas fa-flask text-gray-600 dark:text-gray-300 mr-1"></i><span class="text-gray-600 dark:text-gray-300">模拟</span></button>
                <button id="themeToggle" class="px-2.5 py-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs hover:bg-gray-50 dark:hover:bg-gray-600 transition-all"><i id="themeIcon" class="fas fa-moon text-gray-600 dark:text-yellow-400"></i></button>
            </div>
        </div>
    </header>

    <main class="w-full px-3 py-3 flex-1 overflow-auto">
        <div id="serversContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-5">
        </div>
    </main>

    <div id="loading" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl p-8 flex flex-col items-center">
            <div class="loader mb-4"></div>
            <p class="text-gray-700 dark:text-gray-300">正在连接服务器...</p>
        </div>
    </div>

    <div id="serverDetailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden">
            <div class="bg-gradient-to-r from-green-500 to-green-600 text-white p-4 flex items-center justify-between">
                <h2 id="detailModalTitle" class="text-lg font-bold">服务器详情</h2>
                <button onclick="closeServerDetailModal()" class="text-white hover:text-gray-200"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="detailModalContent" class="p-4 overflow-y-auto max-h-[70vh]">
            </div>
        </div>
    </div>

    <div id="configModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 text-white p-6 flex items-center justify-between">
                <h2 class="text-xl font-bold">服务器配置管理</h2>
                <button id="closeModal" class="text-white hover:text-gray-200"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[70vh]">
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">添加新服务器</h3>
                    <form id="addServerForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">名称</label><input type="text" id="serverName" name="name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                            <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">地址</label><input type="text" id="serverHost" name="host" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">类型</label><select id="serverType" name="type" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"><option value="gpu">GPU</option><option value="npu">NPU</option></select></div>
                            <div class="flex items-center pt-6"><label class="flex items-center"><input type="checkbox" id="isLocal" class="rounded text-blue-600"><span class="ml-2 text-sm text-gray-700 dark:text-gray-300">本地</span></label></div>
                        </div>
                        <div id="remoteFields" class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">SSH端口</label><input type="number" id="serverPort" value="22" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                                <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">认证</label><select id="authType" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"><option value="password">密码</option><option value="key">密钥</option></select></div>
                            </div>
                            <div id="passwordAuthFields"><div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">用户名</label><input type="text" id="serverUsername" name="username" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                                <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密码</label><input type="password" id="serverPassword" name="password" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                            </div></div>
                            <div id="keyAuthFields" class="hidden space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">用户名</label><input type="text" id="keyUsername" name="keyUsername" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                                    <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密钥路径</label><input type="text" id="keyFile" name="keyFile" placeholder="/path/to/key" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                                </div>
                                <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密钥密码(可选)</label><input type="password" id="keyPassword" name="keyPassword" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm dark:bg-gray-700 dark:text-white"></div>
                            </div>
                        </div>
                        <div class="flex justify-end space-x-4">
                            <button type="button" onclick="closeConfigModal()" class="px-6 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-700 dark:text-gray-300">取消</button>
                            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">添加</button>
                        </div>
                    </form>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">现有服务器</h3>
                    <div id="serverList" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-auto py-1">
        <p class="text-center text-gray-400 text-[10px]">XPU监控平台</p>
    </footer>

<script>
var eventSource = null, servers = {}, isDarkMode = false;
var reconnectAttempts = 0, maxReconnectAttempts = 15, reconnectDelay = 1000, reconnectTimer = null;

var serversContainer = document.getElementById('serversContainer');
var refreshBtn = document.getElementById('refreshBtn');
var configBtn = document.getElementById('configBtn');
var mockDataBtn = document.getElementById('mockDataBtn');
var themeToggle = document.getElementById('themeToggle');
var themeIcon = document.getElementById('themeIcon');
var configModal = document.getElementById('configModal');
var loadingDiv = document.getElementById('loading');
var addServerForm = document.getElementById('addServerForm');
var isLocalCheckbox = document.getElementById('isLocal');
var remoteFields = document.getElementById('remoteFields');

// Theme
function initTheme() {
    var dark = localStorage.theme === 'dark' || (!('theme' in localStorage) && matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', dark);
    isDarkMode = dark;
    themeIcon.className = dark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
}
function toggleTheme() {
    isDarkMode = !isDarkMode;
    document.documentElement.classList.toggle('dark', isDarkMode);
    localStorage.theme = isDarkMode ? 'dark' : 'light';
    themeIcon.className = isDarkMode ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
}

document.addEventListener('DOMContentLoaded', function() {
    initTheme();
    initializeSSE();
    setupUI();
});

// SSE
function initializeSSE() {
    hideLoading();
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/sse');
    eventSource.onopen = function() {
        reconnectAttempts = 0; reconnectDelay = 1000; hideLoading();
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };
    eventSource.onmessage = function(event) {
        try {
            var data = JSON.parse(event.data);
            if (data.type === 'initial_data' || data.type === 'servers_refreshed') updateServers(data.data);
            else if (data.type === 'server_update') updateServer(data.data);
        } catch (e) { console.error('SSE parse error:', e); }
    };
    eventSource.onerror = function() { scheduleReconnect(); };
}
function scheduleReconnect() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    if (reconnectAttempts >= maxReconnectAttempts) { showLoading('连接失败，请刷新页面'); return; }
    if (reconnectAttempts === 0) showLoading('SSE连接中断，正在重连...');
    reconnectTimer = setTimeout(function() {
        reconnectAttempts++;
        reconnectDelay = Math.min(1000 * Math.pow(1.5, reconnectAttempts - 1), 30000);
        initializeSSE();
    }, reconnectDelay);
}

// UI Setup
function setupUI() {
    refreshBtn.onclick = refreshData;
    configBtn.onclick = openConfigModal;
    mockDataBtn.onclick = loadMockData;
    document.getElementById('closeModal').onclick = closeConfigModal;
    themeToggle.onclick = toggleTheme;
    isLocalCheckbox.onchange = function() { remoteFields.style.display = isLocalCheckbox.checked ? 'none' : 'block'; };
    document.getElementById('authType').onchange = toggleAuthFields;
    addServerForm.onsubmit = function(e) { e.preventDefault(); addServer(); };
    configModal.onclick = function(e) { if (e.target === configModal) closeConfigModal(); };
    document.getElementById('serverDetailModal').onclick = function(e) { if (e.target === document.getElementById('serverDetailModal')) closeServerDetailModal(); };
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') mockDataBtn.style.display = '';
}
function toggleAuthFields() {
    var t = document.getElementById('authType').value;
    document.getElementById('passwordAuthFields').style.display = t === 'password' ? '' : 'none';
    document.getElementById('keyAuthFields').style.display = t === 'key' ? '' : 'none';
}

// Helpers
function usageColor(pct) { return pct > 90 ? 'bg-red-500' : pct > 80 ? 'bg-yellow-500' : 'bg-green-500'; }
function usageTextColor(pct) { return pct > 90 ? 'text-red-500' : pct > 80 ? 'text-yellow-500' : 'text-gray-500 dark:text-gray-400'; }
function parseMemUsage(memStr) {
    var result = { used: 0, total: 0, pct: 0, text: '' };
    if (!memStr || memStr === 'N/A' || memStr.indexOf('/') === -1) return result;
    var parts = memStr.split('/');
    var used = parseInt(parts[0]), total = parseInt(parts[1]);
    if (isNaN(used) || isNaN(total) || total === 0) return result;
    result.used = used; result.total = total; result.pct = Math.round(used / total * 100);
    result.text = (used / 1024).toFixed(1) + '/' + (total / 1024).toFixed(0) + 'G';
    return result;
}

// Create server card - compact for 20 servers on 2K screen
function createServerCard(s) {
    var div = document.createElement('div');
    div.className = 'server-column bg-white dark:bg-gray-800 rounded-lg shadow-md border border-gray-200 dark:border-gray-700 overflow-hidden cursor-pointer flex flex-col';
    div.id = 'server-' + s.host;
    div.onclick = function() { openServerDetailModal(s); };

    var dotColor = { online: 'bg-green-500', offline: 'bg-red-500', error: 'bg-yellow-500' };
    var dc = dotColor[s.status] || dotColor.offline;
    var devCount = s.devices ? s.devices.length : 0;
    var typeLabel = s.type === 'npu' ? 'NPU' : 'GPU';
    var typeBg = s.type === 'npu'
        ? 'bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-300'
        : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900 dark:text-indigo-300';
    var timeStr = s.last_update ? s.last_update.split(' ')[1] : '-';

    // Title bar
    var h = '<div class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-50 dark:bg-gray-750 border-b border-gray-200 dark:border-gray-700">';
    h += '<div class="w-2 h-2 rounded-full ' + dc + ' flex-shrink-0"></div>';
    h += '<span class="text-sm font-semibold text-gray-800 dark:text-gray-200 truncate flex-1" title="' + s.name + ' ' + s.host + '">' + s.name + '</span>';
    h += '<span class="text-xs text-gray-400 flex-shrink-0">' + s.host + '</span>';
    h += '</div>';

    // Content area
    h += '<div class="px-3 py-2 flex-1 min-h-0">';

    // Devices - two column grid
    if (s.status !== 'online' || !s.devices || s.devices.length === 0) {
        var msg = s.status === 'offline' ? '离线' : s.status === 'error' ? '错误' : '无设备';
        h += '<div class="text-sm text-gray-400 italic py-1">' + msg + '</div>';
    } else {
        var dt = s.type === 'npu' ? 'N' : 'G';
        var maxShow = 8;
        h += '<div class="grid grid-cols-2 gap-x-2">';
        for (var i = 0; i < Math.min(s.devices.length, maxShow); i++) {
            var d = s.devices[i];
            var mem = parseMemUsage(d.memory_usage);
            h += '<div class="dev-row">';
            h += '<span class="text-xs text-gray-500 dark:text-gray-400 w-6 flex-shrink-0 font-mono">' + dt + d.id + '</span>';
            h += '<div class="bar-bg"><div class="bar-fill ' + usageColor(mem.pct) + '" style="width:' + mem.pct + '%"></div></div>';
            h += '<span class="text-xs font-medium ' + usageTextColor(mem.pct) + ' w-12 flex-shrink-0 text-right">' + mem.text + '</span>';
            h += '</div>';
        }
        if (s.devices.length > maxShow) {
            h += '<span class="text-xs text-gray-400 col-span-2 text-center">+' + (s.devices.length - maxShow) + '</span>';
        }
        h += '</div>';
    }

    // Divider
    h += '<div class="border-t border-gray-100 dark:border-gray-700 my-1"></div>';

    // Storage - single column grid
    if (s.status === 'online' && s.storage && Object.keys(s.storage).length > 0) {
        var stKeys = Object.keys(s.storage);
        h += '<div class="flex flex-col gap-0.5">';
        for (var i = 0; i < stKeys.length; i++) {
            var path = stKeys[i];
            var info = s.storage[path];
            var pct = info.usage_percent || 0;
            h += '<div class="sto-row">';
            h += '<span class="text-xs text-gray-600 dark:text-gray-300 w-12 flex-shrink-0 truncate" title="' + path + '">' + path + '</span>';
            h += '<div class="bar-bg"><div class="bar-fill ' + usageColor(pct) + '" style="width:' + pct + '%"></div></div>';
            h += '<span class="text-xs ' + usageTextColor(pct) + ' w-14 flex-shrink-0 text-right">' + info.used + '/' + info.total + '</span>';
            h += '</div>';
        }
        h += '</div>';
    }

    // Endpoints
    if (s.status === 'online' && s.endpoints && Object.keys(s.endpoints).length > 0) {
        h += '<div class="border-t border-gray-100 dark:border-gray-700 my-1"></div>';
        var epKeys = Object.keys(s.endpoints);
        for (var i = 0; i < epKeys.length; i++) {
            var ep = s.endpoints[epKeys[i]];
            var allOk = ep.status === 'reachable';
            var partial = ep.status === 'partial';
            var dot = allOk ? 'bg-green-500' : partial ? 'bg-yellow-500' : 'bg-red-500';
            var tc = allOk ? 'text-green-600 dark:text-green-400' : partial ? 'text-yellow-600 dark:text-yellow-400' : 'text-red-500';
            h += '<div class="ep-row">';
            h += '<div class="w-2 h-2 rounded-full ' + dot + ' flex-shrink-0"></div>';
            h += '<span class="text-xs ' + tc + ' flex-1 truncate" title="' + ep.name + '">' + ep.name + '</span>';
            // 多IP：全通显示平均时延，部分不通显示不通IP数
            if (ep.total_count) {
                if (allOk && ep.latency) {
                    h += '<span class="text-[10px] text-gray-500 flex-shrink-0 text-right whitespace-nowrap">' + ep.reachable_count + '/' + ep.total_count + ' ' + ep.latency + 'ms</span>';
                } else if (ep.unreachable_hosts && ep.unreachable_hosts.length > 0) {
                    h += '<span class="text-[10px] text-red-400 flex-shrink-0 text-right whitespace-nowrap" title="不通: ' + ep.unreachable_hosts.join(', ') + '">' + ep.reachable_count + '/' + ep.total_count + '</span>';
                } else {
                    h += '<span class="text-xs text-gray-400 w-12 flex-shrink-0 text-right">' + ep.reachable_count + '/' + ep.total_count + '</span>';
                }
            } else {
                h += '<span class="text-xs text-gray-400 w-10 flex-shrink-0 text-right">' + (ep.latency ? ep.latency + 'ms' : '不通') + '</span>';
            }
            h += '</div>';
        }
    }

    h += '</div>';

    // Footer
    h += '<div class="flex items-center justify-between px-2 py-0 text-[10px] text-gray-500">';
    h += typeLabel + devCount + '卡';
    h += '<span class="text-[10px] text-gray-500">' + timeStr + '</span>';
    h += '</div>';

    div.innerHTML = h;
    return div;
}

// Update functions
function updateServers(list) {
    serversContainer.innerHTML = '';
    servers = {};
    for (var i = 0; i < list.length; i++) {
        servers[list[i].host] = list[i];
        serversContainer.appendChild(createServerCard(list[i]));
    }
}

function updateServer(s) {
    servers[s.host] = s;
    var existing = document.getElementById('server-' + s.host);
    var newCard = createServerCard(s);
    if (existing) existing.parentNode.replaceChild(newCard, existing);
    else serversContainer.appendChild(newCard);
}

async function refreshData() {
    refreshBtn.disabled = true;
    refreshBtn.querySelector('i').classList.add('fa-spin');
    try { await fetch('/api/refresh', { method: 'POST' }); }
    catch (e) { console.error(e); }
    finally { setTimeout(function() { refreshBtn.disabled = false; refreshBtn.querySelector('i').classList.remove('fa-spin'); }, 1000); }
}

// Config Modal
function openConfigModal() { configModal.classList.remove('hidden'); loadServerConfig(); }
function closeConfigModal() {
    configModal.classList.add('hidden');
    addServerForm.reset();
    isLocalCheckbox.checked = false;
    remoteFields.style.display = 'block';
    document.getElementById('authType').value = 'password';
    toggleAuthFields();
}

async function loadServerConfig() {
    try {
        var r = await fetch('/api/config');
        renderServerList((await r.json()).servers || []);
    } catch (e) { console.error(e); }
}

function renderServerList(list) {
    var el = document.getElementById('serverList');
    el.innerHTML = '';
    if (!list.length) { el.innerHTML = '<p class="text-center text-gray-400 py-8">暂无服务器</p>'; return; }
    for (var i = 0; i < list.length; i++) {
        var s = list[i];
        var local = s.local || s.host === 'localhost' || s.host === '127.0.0.1';
        var item = document.createElement('div');
        item.className = 'bg-gray-50 dark:bg-gray-700 rounded-lg p-3 flex items-center justify-between';
        item.innerHTML =
            '<div class="flex items-center gap-3"><div><h4 class="font-medium text-gray-900 dark:text-white text-sm">' + s.name + '</h4><p class="text-xs text-gray-400">' + s.host + '</p></div>' +
            '<div class="flex gap-2">' +
            '<span class="px-2 py-0.5 text-xs font-medium ' + (local ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200' : 'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-200') + ' rounded-full">' + (local ? '本地' : '远程') + '</span>' +
            '<span class="px-2 py-0.5 text-xs font-medium ' + (s.type === 'npu' ? 'bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-200' : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900 dark:text-indigo-200') + ' rounded-full">' + (s.type === 'npu' ? 'NPU' : 'GPU') + '</span>' +
            '</div></div>' +
            '<button onclick="deleteServer(\'' + s.name.replace(/'/g, "\\'") + '\')" class="text-red-500 hover:text-red-700 p-2"><i class="fas fa-trash"></i></button>';
        el.appendChild(item);
    }
}

async function addServer() {
    var fd = new FormData(addServerForm);
    var data = { name: fd.get('name'), host: fd.get('host'), type: fd.get('type'), local: isLocalCheckbox.checked };
    if (!data.local) {
        data.port = parseInt(document.getElementById('serverPort').value) || 22;
        var at = document.getElementById('authType').value;
        if (at === 'password') data.auth = { type: 'password', username: fd.get('username'), password: fd.get('password') };
        else data.auth = { type: 'key', username: fd.get('keyUsername'), key_file: fd.get('keyFile'), key_password: fd.get('keyPassword') || null };
    }
    try {
        var r = await fetch('/api/config/server', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        var res = await r.json();
        if (r.ok) { alert('添加成功'); closeConfigModal(); } else alert('添加失败: ' + res.error);
    } catch (e) { alert('添加失败'); console.error(e); }
}

async function deleteServer(name) {
    if (!confirm('确定删除 "' + name + '"?')) return;
    try {
        var r = await fetch('/api/config/server/' + encodeURIComponent(name), { method: 'DELETE' });
        if (r.ok) { alert('删除成功'); loadServerConfig(); } else alert('删除失败');
    } catch (e) { alert('删除失败'); console.error(e); }
}

function showLoading(msg) { loadingDiv.classList.remove('hidden'); loadingDiv.querySelector('p').textContent = msg || '正在连接...'; }
function hideLoading() { loadingDiv.classList.add('hidden'); }

// Server Detail Modal
function openServerDetailModal(s) {
    var modal = document.getElementById('serverDetailModal');
    var title = document.getElementById('detailModalTitle');
    var content = document.getElementById('detailModalContent');
    
    title.textContent = s.name + ' (' + s.host + ')';
    
    var dotColor = { online: 'bg-green-500', offline: 'bg-red-500', error: 'bg-yellow-500' };
    var dc = dotColor[s.status] || dotColor.offline;
    var statusText = s.status === 'online' ? '在线' : s.status === 'offline' ? '离线' : '错误';
    
    var h = '<div class="space-y-4">';
    h += '<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full ' + dc + '"></div><span class="text-sm font-medium">' + statusText + '</span>';
    if (s.last_update) h += '<span class="text-xs text-gray-400 ml-2">更新于: ' + s.last_update + '</span>';
    h += '</div>';
    
    // Devices
    if (s.devices && s.devices.length > 0) {
        h += '<div><h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">设备 (' + s.devices.length + ')</h3>';
        h += '<div class="grid gap-2">';
        for (var i = 0; i < s.devices.length; i++) {
            var d = s.devices[i];
            var mem = parseMemUsage(d.memory_usage);
            h += '<div class="bg-gray-50 dark:bg-gray-700 rounded p-2">';
            h += '<div class="flex items-center gap-2 mb-1">';
            h += '<span class="text-xs font-mono font-semibold text-gray-700 dark:text-gray-300">' + d.id + '</span>';
            h += '<span class="text-xs text-gray-500 dark:text-gray-400 truncate flex-1">' + (d.name || '') + '</span>';
            h += '</div>';
            h += '<div class="flex items-center gap-2">';
            h += '<div class="flex-1"><div class="h-2 bg-gray-200 dark:bg-gray-600 rounded"><div class="h-2 rounded ' + usageColor(mem.pct) + '" style="width:' + mem.pct + '%"></div></div></div>';
            h += '<span class="text-xs ' + usageTextColor(mem.pct) + ' w-16 text-right">' + mem.text + '</span>';
            h += '</div>';
            h += '<div class="flex items-center gap-3 mt-1 text-xs text-gray-500">';
            if (d.temp) h += '<span><i class="fas fa-thermometer-half mr-1"></i>' + d.temp + '</span>';
            if (d.power) h += '<span><i class="fas fa-bolt mr-1"></i>' + d.power + '</span>';
            if (d.utilization) h += '<span><i class="fas fa-microchip mr-1"></i>' + d.utilization + '</span>';
            h += '</div>';
            h += '</div>';
        }
        h += '</div></div>';
    }
    
    // Storage
    if (s.status === 'online' && s.storage && Object.keys(s.storage).length > 0) {
        var stKeys = Object.keys(s.storage);
        h += '<div class="flex flex-col gap-0.5">';
        for (var i = 0; i < stKeys.length; i++) {
            var path = stKeys[i];
            var info = s.storage[path];
            var pct = info.usage_percent || 0;
            h += '<div class="sto-row flex items-center gap-2">';
            h += '<span class="text-xs text-gray-600 dark:text-gray-300 w-20 flex-shrink-0 truncate" title="' + path + '">' + path + '</span>';
            h += '<div class="bar-bg flex-1 min-w-0"><div class="bar-fill ' + usageColor(pct) + '" style="width:' + pct + '%"></div></div>';
            h += '<span class="text-xs ' + usageTextColor(pct) + ' w-20 flex-shrink-0 text-right" title="' + info.used + '/' + info.total + '">' + info.used + '/' + info.total + '</span>';
            h += '</div>';
        }
        h += '</div>';
    }
    
    // Endpoints - 详细显示每个IP的连通性
    if (s.endpoints && Object.keys(s.endpoints).length > 0) {
        h += '<div><h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">端点连通性</h3>';
        h += '<div class="grid gap-3">';
        var epKeys = Object.keys(s.endpoints);
        for (var i = 0; i < epKeys.length; i++) {
            var ep = s.endpoints[epKeys[i]];
            var allOk = ep.status === 'reachable';
            var partial = ep.status === 'partial';
            var dot = allOk ? 'bg-green-500' : partial ? 'bg-yellow-500' : 'bg-red-500';
            var statusBg = allOk ? 'bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-800' : partial ? 'bg-yellow-50 dark:bg-yellow-900/30 border-yellow-200 dark:border-yellow-800' : 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800';
            
            h += '<div class="rounded-lg p-3 border ' + statusBg + '">';
            h += '<div class="flex items-center gap-2 mb-2">';
            h += '<div class="w-2.5 h-2.5 rounded-full ' + dot + '"></div>';
            h += '<span class="text-sm font-medium text-gray-700 dark:text-gray-300">' + ep.name + '</span>';
            if (ep.latency) h += '<span class="text-xs text-gray-500 ml-auto">' + ep.latency + 'ms</span>';
            h += '</div>';
            
            // 显示主机信息
            if (ep.total_count && ep.total_count > 1) {
                h += '<div class="text-xs text-gray-500 mb-2">' + ep.reachable_count + '/' + ep.total_count + ' 个IP可达</div>';
            }
            
            // 显示每个IP的详细状态
            if (ep.details && ep.details.length > 0) {
                h += '<div class="grid grid-cols-2 gap-1">';
                for (var j = 0; j < ep.details.length; j++) {
                    var detail = ep.details[j];
                    var ipOk = detail.status === 'reachable';
                    var ipDot = ipOk ? 'bg-green-500' : 'bg-red-500';
                    h += '<div class="flex items-center gap-1 text-xs">';
                    h += '<div class="w-1.5 h-1.5 rounded-full ' + ipDot + '"></div>';
                    h += '<span class="text-gray-600 dark:text-gray-400 font-mono">' + detail.host + '</span>';
                    if (detail.latency) h += '<span class="text-gray-400 ml-auto">' + detail.latency + 'ms</span>';
                    else if (!ipOk) h += '<span class="text-red-400 ml-auto">不通</span>';
                    h += '</div>';
                }
                h += '</div>';
            } else if (ep.host) {
                h += '<div class="text-xs text-gray-500 font-mono">' + (Array.isArray(ep.host) ? ep.host.join(', ') : ep.host) + '</div>';
            }
            
            // 显示不可达的主机
            if (ep.unreachable_hosts && ep.unreachable_hosts.length > 0) {
                h += '<div class="mt-2 text-xs text-red-500">不通: ' + ep.unreachable_hosts.join(', ') + '</div>';
            }
            
            h += '</div>';
        }
        h += '</div></div>';
    }
    
    h += '</div>';
    content.innerHTML = h;
    modal.classList.remove('hidden');
}

function closeServerDetailModal() {
    document.getElementById('serverDetailModal').classList.add('hidden');;
}

async function loadMockData() {
    mockDataBtn.disabled = true;
    mockDataBtn.querySelector('i').classList.add('fa-spin');
    try { var r = await fetch('/api/mock/data'); if (r.ok) updateServers(await r.json()); }
    catch (e) { console.error(e); }
    finally { setTimeout(function() { mockDataBtn.disabled = false; mockDataBtn.querySelector('i').classList.remove('fa-spin'); }, 500); }
}
</script>
