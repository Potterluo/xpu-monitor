<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPU 监控平台</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Preline UI -->
    <link rel="stylesheet" href="https://preline.co/assets/css/preline.css">
    <script src="https://preline.co/assets/js/preline.js"></script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- EventSource polyfill for older browsers -->
    <script src="https://cdn.jsdelivr.net/npm/event-source-polyfill@1.0.26/src/eventsource.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554'
                        },
                        secondary: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617'
                        },
                        success: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16'
                        },
                        warning: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                            950: '#451a03'
                        },
                        danger: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'scale-in': 'scaleIn 0.2s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            @apply bg-gray-100 dark:bg-gray-800;
        }
        ::-webkit-scrollbar-thumb {
            @apply bg-gray-300 dark:bg-gray-600 rounded-full;
        }
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-gray-400 dark:bg-gray-500;
        }

        /* Ensure equal height cards */
        .grid {
            grid-auto-rows: 1fr;
        }

        .card-equal-height {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Glass morphism effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Loading animation */
        .loader {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Smooth transitions */
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        /* Full width container optimization */
        body {
            overflow-x: hidden;
        }

        main {
            max-width: 100vw;
        }

        /* 3xl breakpoint for very large screens */
        @media (min-width: 1920px) {
            .grid {
                grid-template-columns: repeat(10, minmax(0, 1fr));
            }
        }

        @media (min-width: 2560px) {
            .grid {
                grid-template-columns: repeat(12, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 min-h-screen font-sans flex flex-col">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-gray-200 dark:border-gray-700">
        <div class="w-full px-4 py-3">
            <div class="flex items-center justify-between">
                <!-- Logo and Title -->
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-microchip text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900 dark:text-white">XPU 监控平台</h1>
                        <p class="text-xs text-gray-500 dark:text-gray-400">实时性能监控平台</p>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center space-x-3">
                    <!-- Refresh Button -->
                    <button id="refreshBtn" class="relative group">
                        <div class="absolute inset-0 bg-primary-500 rounded-lg scale-0 group-hover:scale-100 transition-transform duration-300"></div>
                        <div class="relative bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 flex items-center space-x-2 hover:shadow-lg transition-all duration-300">
                            <i class="fas fa-sync-alt text-gray-700 dark:text-gray-300 group-hover:text-white text-sm"></i>
                            <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-white">刷新</span>
                        </div>
                    </button>

                    <!-- Settings Button -->
                    <button id="configBtn" class="relative group">
                        <div class="absolute inset-0 bg-secondary-500 rounded-lg scale-0 group-hover:scale-100 transition-transform duration-300"></div>
                        <div class="relative bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 flex items-center space-x-2 hover:shadow-lg transition-all duration-300">
                            <i class="fas fa-cog text-gray-700 dark:text-gray-300 group-hover:text-white text-sm"></i>
                            <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-white">配置</span>
                        </div>
                    </button>

                    <!-- Mock Data Button (Development Only) -->
                    <button id="mockDataBtn" class="relative group" style="display: none;">
                        <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg scale-0 group-hover:scale-100 transition-transform duration-300"></div>
                        <div class="relative bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2 flex items-center space-x-2 hover:shadow-lg transition-all duration-300">
                            <i class="fas fa-flask text-gray-700 dark:text-gray-300 group-hover:text-white text-sm"></i>
                            <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-white">模拟数据</span>
                        </div>
                    </button>

                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="relative group">
                        <div class="absolute inset-0 bg-gray-700 rounded-lg scale-0 group-hover:scale-100 transition-transform duration-300"></div>
                        <div class="relative bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-2 hover:shadow-lg transition-all duration-300">
                            <i class="fas fa-moon text-gray-700 dark:text-yellow-400 group-hover:text-white" id="themeIcon"></i>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full px-4 py-4 flex-1">
        <!-- Server Cards Grid -->
        <div id="servers" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 3xl:grid-cols-10 gap-3 auto-rows-max w-full">
            <!-- Server cards will be dynamically inserted here -->
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl p-8 flex flex-col items-center">
            <div class="loader mb-4"></div>
            <p class="text-gray-700 dark:text-gray-300">正在连接服务器...</p>
        </div>
    </div>

    <!-- Configuration Modal -->
    <div id="configModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="bg-gradient-to-r from-primary-500 to-primary-600 text-white p-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">服务器配置管理</h2>
                    <button id="closeModal" class="text-white hover:text-gray-200 transition-colors">

                    </button>
                </div>
            </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">主机地址</label>
                                <input type="text" id="serverHost" name="host" required
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">设备类型</label>
                                <select id="serverType" name="type" required
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                                    <option value="gpu">GPU</option>
                                    <option value="npu">NPU</option>
                                </select>
                            </div>
                            <div class="flex items-center">
                                <label class="flex items-center">
                                    <input type="checkbox" id="isLocal" name="local" class="rounded text-primary-600 focus:ring-primary-500">
                                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">本地机器</span>
                                </label>
                            </div>
                        </div>

                        <!-- Remote fields will be dynamically shown/hidden -->
                        <div id="remoteFields" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">SSH端口</label>
                                    <input type="number" id="serverPort" name="port" value="22"
                                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">认证方式</label>

                                        <option value="password">密码认证</option>
                                        <option value="key">密钥认证</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Password auth fields -->

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">用户名</label>
                                        <input type="text" id="serverUsername" name="username"
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">

                                    </div>
                                </div>

                            <!-- Key auth fields -->
                            <div id="keyAuthFields" class="space-y-4 hidden">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">用户名</label>
                                        <input type="text" id="keyUsername" name="keyUsername"
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">

                                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">密钥文件路径</label>
                                        <input type="text" id="keyFile" name="keyFile" placeholder="/path/to/private_key"

                                    </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">密钥密码 (可选)</label>
                                    <input type="password" id="keyPassword" name="keyPassword" placeholder="如果密钥有密码则填写"

    <!-- Footer -->

            <p class="text-gray-500 dark:text-gray-400 text-sm">
                © 2025 XPU监控平台.
            </p>
        </div>

    <script>
        // Global variables
        let eventSource;
        let servers = {};
        let isDarkMode = false;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 15;
        let reconnectDelay = 1000;
        let reconnectTimer = null;

        // DOM elements
        const serversContainer = document.getElementById('servers');
        const refreshBtn = document.getElementById('refreshBtn');
        const configBtn = document.getElementById('configBtn');
        const mockDataBtn = document.getElementById('mockDataBtn');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const configModal = document.getElementById('configModal');
        const closeModal = document.getElementById('closeModal');
        const loadingDiv = document.getElementById('loading');
        const addServerForm = document.getElementById('addServerForm');
        const serverList = document.getElementById('serverList');
        const isLocalCheckbox = document.getElementById('isLocal');
        const remoteFields = document.getElementById('remoteFields');

        // Initialize theme
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                isDarkMode = true;
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                document.documentElement.classList.remove('dark');
                isDarkMode = false;
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        // Toggle theme
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        // Initialize application
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            initializeSSE();
            setupEventListeners();

            // Check if development environment and show mock data button
            checkDevelopmentEnvironment();

            // Set default state - show remote fields with password auth
            isLocalCheckbox.checked = false;
            remoteFields.style.display = 'block';
            document.getElementById('authType').value = 'password';
            toggleAuthFields();
        });

        // Initialize SSE connection
        function initializeSSE() {
            console.log('正在连接SSE流...');
            hideLoading();
            
            // 关闭现有的连接
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource('/api/sse');

            eventSource.onopen = function(event) {
                console.log('SSE连接已建立');
                reconnectAttempts = 0;
                reconnectDelay = 1000;
                hideLoading();

                // 清除任何现有的重连定时器
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    // console.log('接收到SSE消息:', data.type);

                    switch (data.type) {
                        case 'initial_data':
                            console.log('接收到初始数据，服务器数量:', data.data.length);
                            updateServers(data.data);
                            break;
                        case 'server_update':
                            console.log('服务器更新:', data.data.name);
                            updateServer(data.data);
                            break;
                        case 'servers_refreshed':
                            // console.log('接收到服务器列表刷新，服务器数量:', data.data.length);
                            updateServers(data.data);
                            break;
                        case 'heartbeat':
                            // 心跳消息，保持连接活跃
                            // console.log('收到心跳');
                            break;
                        default:
                            console.log('未知消息类型:', data.type);
                    }
                } catch (e) {
                    console.error('解析SSE消息失败:', e, event.data);
                }
            };

            eventSource.onerror = function(event) {
                console.error('SSE连接错误:', event);
                scheduleReconnect();
            };
        }

        // Schedule reconnection
        function scheduleReconnect() {
            // 清除现有定时器
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
            }

            // 如果达到最大重连次数，停止尝试
            if (reconnectAttempts >= maxReconnectAttempts) {
                showLoading('连接失败，请刷新页面重试');
                return;
            }

            // 显示重连提示
            if (reconnectAttempts === 0) {
                showLoading('SSE连接中断，正在重连...');
            }

            // 设置重连定时器
            reconnectTimer = setTimeout(() => {
                reconnectAttempts++;

                // 指数退避策略，但设置最大延迟为30秒
                const delay = Math.min(reconnectDelay * Math.pow(1.5, reconnectAttempts - 1), 30000);

                console.log(`尝试重连 (${reconnectAttempts}/${maxReconnectAttempts})，延迟: ${delay}ms`);

                // 重新初始化SSE连接
                initializeSSE();

                reconnectDelay = delay;
            }, reconnectDelay);
        }

        // Setup event listeners
        function setupEventListeners() {
            refreshBtn.addEventListener('click', function() {
                refreshData();
            });

            configBtn.addEventListener('click', function() {
                openConfigModal();
            });

            mockDataBtn.addEventListener('click', function() {
                loadMockData();
            });

            closeModal.addEventListener('click', function() {
                closeConfigModal();
            });

            themeToggle.addEventListener('click', toggleTheme);

            // Local machine checkbox
            isLocalCheckbox.addEventListener('change', function() {
                toggleRemoteFields();
            });

            // Add server form
            addServerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                addServer();
            });

            // Close modal on outside click
            configModal.addEventListener('click', function(e) {
                if (e.target === configModal) {
                    closeConfigModal();
                }
            });
        }

        // Toggle remote fields
        function toggleRemoteFields() {
            if (isLocalCheckbox.checked) {
                remoteFields.style.display = 'none';
                clearAllFields();
            } else {
                remoteFields.style.display = 'block';
            }
        }

        // Render all devices compact version (individual memory bars for each device)

            if (serverData.status === 'error') {
                return `<div class="text-center py-2 flex-1 flex items-center justify-center"><i class="fas fa-exclamation-circle text-red-500 text-base mb-1"></i><p class="text-xs text-red-500">${serverData.error || '错误'}</p></div>`;

            if (!serverData.devices || serverData.devices.length === 0) {

            }

            // Process each device to get memory percentage and convert to GB
            const deviceData = serverData.devices.map(device => {
                const memoryUsage = device.memory_usage || 'N/A';
                let memoryPercent = 0;
                let memoryText = memoryUsage;

                if (memoryUsage !== 'N/A' && memoryUsage.includes('/')) {
                    const parts = memoryUsage.split('/');
                    const used = parseInt(parts[0]);
                    const total = parseInt(parts[1]);
                    if (!isNaN(used) && !isNaN(total) && total > 0) {
                        memoryPercent = Math.round((used / total) * 100);
                        // Convert MB to GB and round to 1 decimal place
                        const usedGB = (used / 1024).toFixed(1);
                        const totalGB = (total / 1024).toFixed(0);
                        memoryText = `${usedGB}/${totalGB}G`;

                };

            const deviceType = serverData.type === 'npu' ? 'NPU' : 'GPU';

            return 'text-green-600 dark:text-green-400';

            const configs = {
                online: {
                    text: '在线',
                    bgColor: 'bg-green-100 dark:bg-green-900',
                    textColor: 'text-green-800 dark:text-green-200',

                }

            return configs[status] || configs.offline;
        }

        // Get temperature class
        function getTempClass(temp) {
            if (!temp) return 'text-gray-500 dark:text-gray-400';
            const tempValue = parseInt(temp);
            if (tempValue < 60) return 'text-green-600 dark:text-green-400';
            if (tempValue < 80) return 'text-yellow-600 dark:text-yellow-400';
            return 'text-red-600 dark:text-red-400';
        }

        // Get utilization class
        function getUtilClass(utilization) {
            if (!utilization) return 'text-gray-500 dark:text-gray-400';
            const utilValue = parseInt(utilization);
            if (utilValue < 30) return 'text-blue-600 dark:text-blue-400';
            if (utilValue < 70) return 'text-yellow-600 dark:text-yellow-400';
            return 'text-red-600 dark:text-red-400';
        }

        // Update all servers
        function updateServers(serverDataList) {
            serversContainer.innerHTML = '';
            servers = {};

            serverDataList.forEach(serverData => {
                servers[serverData.host] = serverData;
                createServerCard(serverData);
            });
        }

        // Update single server
        function updateServer(serverData) {
            servers[serverData.host] = serverData;

            let serverCard = document.getElementById(`server-${serverData.host}`);
            if (serverCard) {
                const newCard = createServerCard(serverData);
                serverCard.replaceWith(newCard);
            } else {
                createServerCard(serverData);
            }
        }

        // Refresh data
        async function refreshData() {
            refreshBtn.disabled = true;
            const icon = refreshBtn.querySelector('i');
            icon.classList.add('fa-spin');

            try {
                const response = await fetch('/api/refresh', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    console.log('手动刷新成功');
                } else {
                    console.error('刷新失败');
                }
            } catch (error) {
                console.error('刷新请求失败:', error);
            } finally {
                setTimeout(() => {
                    refreshBtn.disabled = false;
                    icon.classList.remove('fa-spin');
                }, 1000);
            }
        }

                console.error('加载服务器配置失败:', error);

        // Render server list
        function renderServerList(servers) {
            serverList.innerHTML = '';

            if (servers.length === 0) {
                serverList.innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400 py-8">暂无服务器配置</p>';
                return;
            }

            servers.forEach(server => {
                const serverItem = document.createElement('div');
                serverItem.className = 'bg-gray-50 dark:bg-gray-700 rounded-lg p-4 flex items-center justify-between hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors';

                const localBadge = server.local || server.host === 'localhost' || server.host === '127.0.0.1'
                    ? '<span class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 rounded-full">本地</span>'
                    : '<span class="px-2 py-1 text-xs font-medium bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-200 rounded-full">远程</span>';

                const typeBadge = server.type === 'npu'
                    ? '<span class="px-2 py-1 text-xs font-medium bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-200 rounded-full">NPU</span>'
                    : '<span class="px-2 py-1 text-xs font-medium bg-indigo-100 text-indigo-800 dark:bg-indigo-900 dark:text-indigo-200 rounded-full">GPU</span>';

                serverItem.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div>
                            <h4 class="font-medium text-gray-900 dark:text-white">${server.name}</h4>
                            <p class="text-sm text-gray-500 dark:text-gray-400">${server.host}</p>
                        </div>
                        <div class="flex space-x-2">
                            ${localBadge}
                            ${typeBadge}
                        </div>
                    </div>
                    <button onclick="deleteServer('${server.name}')" class="text-red-500 hover:text-red-700 transition-colors">
                        <i class="fas fa-trash"></i>
                    </button>
                `;

                serverList.appendChild(serverItem);
            });
        }

        // Add server
        async function addServer() {
            const formData = new FormData(addServerForm);
            const serverData = {
                name: formData.get('name'),
                host: formData.get('host'),
                type: formData.get('type'),
                local: isLocalCheckbox.checked
            };

            if (!serverData.local) {
                serverData.port = parseInt(formData.get('port')) || 22;

                const authType = formData.get('authType');
                if (authType === 'password') {
                    serverData.auth = {
                        type: 'password',
                        username: formData.get('username'),
                        password: formData.get('password')
                    };
                } else if (authType === 'key') {
                    serverData.auth = {
                        type: 'key',
                        username: formData.get('keyUsername'),
                        key_file: formData.get('keyFile'),
                        key_password: formData.get('keyPassword') || null
                    };
                }
            }

            try {
                const response = await fetch('/api/config/server', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(serverData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('服务器添加成功');
                    closeConfigModal();
                } else {
                    alert(`添加失败: ${result.error}`);
                }
            } catch (error) {
                console.error('添加服务器失败:', error);
                alert('添加服务器失败，请检查网络连接');
            }
        }

        // Delete server
        async function deleteServer(serverName) {
            if (!confirm(`确定要删除服务器 "${serverName}" 吗？`)) {
                return;
            }

            try {
                const response = await fetch(`/api/config/server/${encodeURIComponent(serverName)}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (response.ok) {
                    alert('服务器删除成功');
                    // 重新加载配置列表
                    loadServerConfig();
                } else {
                    alert(`删除失败: ${result.error}`);
                }
            } catch (error) {
                console.error('删除服务器失败:', error);
                alert('删除服务器失败，请检查网络连接');
            }
        }

        // Check development environment
        function checkDevelopmentEnvironment() {
            // Show mock data button only in development environment
            const isDevelopment = window.location.hostname === 'localhost' ||
                                 window.location.hostname === '127.0.0.1' ||
                                 window.location.port === '5000' ||
                                 window.location.search.includes('dev=true');

            if (isDevelopment) {
                mockDataBtn.style.display = 'block';
                console.log('开发环境检测：模拟数据按钮已启用');
            } else {
                mockDataBtn.style.display = 'none';
                console.log('生产环境检测：模拟数据按钮已隐藏');
            }
        }

        // Loading functions
        function showLoading(message = '正在连接服务器...') {
            loadingDiv.classList.remove('hidden');
            const loadingText = loadingDiv.querySelector('p');
            if (loadingText) {
                loadingText.textContent = message;
            }
        }

        function hideLoading() {
            loadingDiv.classList.add('hidden');
        }

        // Load mock data for testing
        async function loadMockData() {
            mockDataBtn.disabled = true;
            const icon = mockDataBtn.querySelector('i');
            icon.classList.add('fa-spin');

            try {
                const response = await fetch('/api/mock/data');
                const mockServers = await response.json();

                if (response.ok) {
                    console.log('加载模拟数据成功:', mockServers);
                    updateServers(mockServers);

                    // Show success message
                    showNotification('模拟数据加载成功！显示多台不同配置的测试服务器。', 'success');
                } else {
                    console.error('加载模拟数据失败');
                }
            } catch (error) {
                console.error('加载模拟数据请求失败:', error);
            } finally {
                setTimeout(() => {
                    mockDataBtn.disabled = false;
                    icon.classList.remove('fa-spin');
                }, 1000);
            }
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notificationHtml = `
                <div id="notification" class="fixed top-4 right-4 z-50 animate-fade-in">
                    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg border-l-4 ${
                        type === 'success' ? 'border-green-500' :
                        type === 'error' ? 'border-red-500' :
                        'border-blue-500'
                    } p-4 flex items-center space-x-3">
                        <i class="fas ${
                            type === 'success' ? 'fa-check-circle text-green-500' :
                            type === 'error' ? 'fa-exclamation-circle text-red-500' :
                            'fa-info-circle text-blue-500'
                        }"></i>
                        <span class="text-gray-900 dark:text-white">${message}</span>
                    </div>
                </div>
            `;

            // Remove existing notification
            const existingNotification = document.getElementById('notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            // Add new notification
            document.body.insertAdjacentHTML('beforeend', notificationHtml);

            // Auto remove after 3 seconds
            setTimeout(() => {
                const notification = document.getElementById('notification');
                if (notification) {
                    notification.remove();
                }
            }, 3000);
        }
    </script>
</body>
</html>
